name: Build gn

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            name: gn-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            name: gn-macos-intel
          - goos: darwin
            goarch: arm64
            name: gn-macos-arm
          - goos: linux
            goarch: amd64
            name: gn-linux
          - goos: netbsd
            goarch: amd64
            name: gn-netbsd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Init module
        run: |
          if [ ! -f go.mod ]; then
            go mod init github.com/${{ github.repository_owner }}/gn
          fi
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.name }} gn.go
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
