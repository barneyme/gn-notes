# gn configuration
# Configure ONE backend below. gn detects which engine to use based on
# which set of variables is present and filled in.

# --- GitHub backend ---
# Requires GIT_TOKEN, GIT_OWNER, GIT_REPO to all be set.
GIT_TOKEN=
GIT_OWNER=
GIT_REPO=
# GIT_API=   # optional override, defaults to https://api.github.com/repos/<owner>/<repo>/contents

# --- Dropbox backend ---
# Requires DROPBOX_APP_KEY, DROPBOX_APP_SECRET, DROPBOX_REFRESH_TOKEN to all be set.
DROPBOX_APP_KEY=
DROPBOX_APP_SECRET=
DROPBOX_REFRESH_TOKEN=
DROPBOX_PATH=/notes
